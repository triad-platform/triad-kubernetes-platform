apiVersion: v1
kind: ConfigMap
metadata:
  name: pulsecart-config
  namespace: pulsecart
data:
  # GCP landing-zone tfvars currently disable Cloud SQL PostgreSQL.
  DB_HOST: MISSING_CLOUDSQL_PRIVATE_IP
  DB_PORT: "5432"
  DB_NAME: pulsecart
  DB_SSLMODE: require
  DB_USER: pulsecart
  ORDERS_URL: http://orders:8081
  # GCP landing-zone tfvars currently disable Memorystore Redis.
  REDIS_ADDR: MISSING_MEMORYSTORE_HOST:6379
  REDIS_TLS_ENABLED: "false"
  NATS_URL: nats://triad-nats.messaging.svc.cluster.local:4222
  NOTIFICATIONS_URL: http://notifications:8082
  NOTIFICATIONS_METRICS_URL: http://notifications:8082/metrics
  WORKER_METRICS_URL: http://worker:9091/metrics
  WORKER_METRICS_PORT: "9091"
