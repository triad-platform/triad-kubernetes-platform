apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://kubernetes-sigs.github.io/external-dns/
    chart: external-dns
    targetRevision: "1.19.0"
    helm:
      values: |
        provider:
          name: aws
        policy: upsert-only
        registry: txt
        txtOwnerId: triad-aws-eks-dev
        domainFilters:
          - cloudevopsguru.com
        sources:
          - ingress
        serviceAccount:
          create: false
          name: external-dns
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
