apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-addons
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/example/triad-kubernetes-platform.git
    targetRevision: develop
    path: platform
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

# Starter application for platform add-ons.
# The `platform/` path now exists and is Kustomize-valid, but the concrete controller manifests are still placeholders.
