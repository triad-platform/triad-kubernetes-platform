apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pulsecart-workloads
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/example/triad-app.git
    targetRevision: develop
    path: deploy/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: pulsecart
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

# Starter application for PulseCart workloads.
# The `deploy/k8s` path now exists in `triad-app`, but repoURL and image references are still placeholders.
