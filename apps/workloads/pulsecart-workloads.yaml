apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pulsecart-workloads
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  project: default
  source:
    repoURL: https://github.com/triad-platform/triad-kubernetes-platform.git
    targetRevision: develop
    path: workloads/pulsecart/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: pulsecart
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

# PulseCart dev workloads are now reconciled from the platform repo overlay.
# The overlay pulls the app base from triad-app and owns the live image pins for the dev cluster.
