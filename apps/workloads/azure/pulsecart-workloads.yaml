apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pulsecart-workloads
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/triad-platform/triad-kubernetes-platform.git
    targetRevision: develop
    path: workloads/pulsecart/azure-dev
  destination:
    server: https://kubernetes.default.svc
    namespace: pulsecart
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
