cluster:
  name: triad-aws-eks-dev
  environment: dev
  region: us-east-1
  kubernetesVersion: "1.35"

landingZoneInputs:
  vpcId: "vpc-0980661f4e1fb3aa3"
  privateSubnetIds:
    - "subnet-03dc56e247d58165a"
    - "subnet-0e7de01b411f358d2"
  publicSubnetIds:
    - "subnet-054fd2c237a8afd07"
    - "subnet-07e70eab498bc9ebd"
  availabilityZones:
    - "us-east-1a"
    - "us-east-1b"

addons:
  argocd: true
  ingress: true
  certManager: true
  metricsBaseline: true
  nats: true

applications:
  namespace: pulsecart
  services:
    - api-gateway
    - orders
    - worker
    - notifications

notes:
  - These values now reflect the current triad-landing-zones dev outputs.
  - This file is the cluster bootstrap input contract, not a direct kubectl manifest.
