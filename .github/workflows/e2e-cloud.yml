name: E2E Cloud Smoke

on:
  workflow_dispatch:
  push:
    branches:
      - develop
    paths:
      - ".github/workflows/e2e-cloud.yml"
      - "workloads/pulsecart/dev/**"
      - "apps/workloads/pulsecart-workloads.yaml"

concurrency:
  group: e2e-cloud-develop
  cancel-in-progress: true

jobs:
  smoke-cloud:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Wait for Argo reconciliation window
        run: sleep 90

      - name: Run cloud smoke
        env:
          BASE_URL: https://pulsecart-dev.cloudevopsguru.com
          MAX_ATTEMPTS: "18"
          SLEEP_SECONDS: "10"
        run: |
          set -euo pipefail

          wait_for_http() {
            local url="$1"
            local i
            for ((i = 1; i <= MAX_ATTEMPTS; i++)); do
              if curl -fsS "$url" >/dev/null 2>&1; then
                return 0
              fi
              sleep "$SLEEP_SECONDS"
            done
            return 1
          }

          if ! wait_for_http "${BASE_URL}/healthz"; then
            echo "timed out waiting for ${BASE_URL}/healthz"
            exit 1
          fi

          run_id="$(date +%s)-$$"
          idem_key="cloud-smoke-${run_id}"
          request_id="cloud-smoke-${run_id}"
          request_body='{"user_id":"cloud-smoke-user","currency":"USD","items":[{"sku":"sku-cloud-smoke","quantity":1,"unit_price":1999}]}'

          resp_one="$(mktemp)"
          status_one="$(curl -sS -o "$resp_one" -w '%{http_code}' \
            -X POST "${BASE_URL}/v1/orders" \
            -H "Content-Type: application/json" \
            -H "Idempotency-Key: ${idem_key}" \
            -H "X-Request-Id: ${request_id}" \
            -d "$request_body")"
          if [[ "$status_one" != "201" ]]; then
            echo "expected first request status 201, got ${status_one}"
            cat "$resp_one" || true
            exit 1
          fi
          rm -f "$resp_one"

          resp_two="$(mktemp)"
          status_two="$(curl -sS -o "$resp_two" -w '%{http_code}' \
            -X POST "${BASE_URL}/v1/orders" \
            -H "Content-Type: application/json" \
            -H "Idempotency-Key: ${idem_key}" \
            -H "X-Request-Id: ${request_id}-dup" \
            -d "$request_body")"
          if [[ "$status_two" != "409" ]]; then
            echo "expected duplicate request status 409, got ${status_two}"
            cat "$resp_two" || true
            exit 1
          fi
          rm -f "$resp_two"

          echo "CLOUD SMOKE PASS"
