apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-config
  namespace: observability
type: Opaque
stringData:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      receiver: dev-null
      group_wait: 15s
      group_interval: 1m
      repeat_interval: 4h

    receivers:
      - name: dev-null
