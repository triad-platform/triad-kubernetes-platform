apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin-sync
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: observability-aws-secrets
    kind: SecretStore
  target:
    name: grafana-admin
    creationPolicy: Merge
  data:
    - secretKey: admin-user
      remoteRef:
        key: triad/dev/observability/grafana-admin
        property: admin_user
    - secretKey: admin-password
      remoteRef:
        key: triad/dev/observability/grafana-admin
        property: admin_password
