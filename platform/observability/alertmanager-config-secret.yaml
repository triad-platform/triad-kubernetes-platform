apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-config
  namespace: observability
type: Opaque
stringData:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      receiver: default-webhook
      group_wait: 15s
      group_interval: 1m
      repeat_interval: 4h

    receivers:
      - name: default-webhook
        webhook_configs:
          - url: https://example.invalid/alertmanager-webhook
            send_resolved: true
