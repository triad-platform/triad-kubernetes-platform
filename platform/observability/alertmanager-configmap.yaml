apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: observability
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      receiver: default
      group_wait: 15s
      group_interval: 1m
      repeat_interval: 4h

    receivers:
      - name: default
