apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: observability
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - /etc/prometheus-rules/*.yml

    scrape_configs:
      - job_name: api-gateway
        metrics_path: /metrics
        static_configs:
          - targets:
              - api-gateway.pulsecart.svc.cluster.local:8080

      - job_name: orders
        metrics_path: /metrics
        static_configs:
          - targets:
              - orders.pulsecart.svc.cluster.local:8081

      - job_name: notifications
        metrics_path: /metrics
        static_configs:
          - targets:
              - notifications.pulsecart.svc.cluster.local:8082

      - job_name: worker
        metrics_path: /metrics
        static_configs:
          - targets:
              - worker.pulsecart.svc.cluster.local:9091
